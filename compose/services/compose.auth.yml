#file: noinspection ComposeUnknownValues

services:
    auth-postgres:
        image: postgres:${AUTH_PG_VERSION:?}
        profiles: [auth]
        restart: unless-stopped
        env_file:
            - ../../env/.env.auth
        ports:
            - "${AUTH_PG_PORT:?}:5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s
        volumes:
            - auth-postgres-data:/var/lib/postgresql
        networks: [marketplace]

volumes:
    auth-postgres-data:

networks:
    marketplace:
        name: marketplace